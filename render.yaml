services:
  - type: web
    name: daily-checklist-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        value: file:/opt/data/dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://frontend-seven-ashy-10.vercel.app
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@checklisttracker.com
    disk:
      name: sqlite-db
      mountPath: /opt/data
      sizeGB: 1
